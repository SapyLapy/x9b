<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
}

/* center wrapper */
#wrapper {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(1);
  transform-origin:center;
}

/* draggable edge */
#handle {
  position:absolute;
  right:-10px;
  top:0;
  width:20px;
  height:100%;
  cursor:ew-resize;
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="wrapper">
  <div id="gameContainer"></div>
  <div id="handle"></div>
</div>

<script src="https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/UnityLoader.js"></script>

<script>
var gameInstance = UnityLoader.instantiate(
  "gameContainer",
  "https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/adofaiii4.json"
);

const wrapper = document.getElementById("wrapper");
const handle = document.getElementById("handle");

let scale = 1;
let dragging = false;

handle.addEventListener("mousedown", () => {
  dragging = true;
});

document.addEventListener("mouseup", () => {
  dragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  // distance from center
  const centerX = window.innerWidth / 2;
  const dist = Math.abs(e.clientX - centerX);

  // scale based on how far you drag
  scale = dist / 300; // tweak sensitivity
  scale = Math.max(0.5, Math.min(scale, 3));

  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
});
</script>

</body>
</html>
