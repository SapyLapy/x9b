<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
}

#gameContainer {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(2.0); /* 👈 THIS FIXES SIZE */
  transform-origin:center;
}

canvas {
  display:block;
  max-width:100vw;
  max-height:100vh;
}
</style>
</head>

<body>

<div id="gameContainer"></div>

<script src="https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/UnityLoader.js"></script>

<script>
var gameInstance = UnityLoader.instantiate(
  "gameContainer",
  "https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/adofaiii4.json"
);
</script>

</body>
</html>
