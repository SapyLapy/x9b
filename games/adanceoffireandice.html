<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
}

#gameContainer {
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="gameContainer"></div>

<script src="https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/UnityLoader.js"></script>

<script>
var gameInstance = UnityLoader.instantiate(
  "gameContainer",
  "https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/adofaiii4.json"
);

// fix oversized zoom bug
function fixCanvas() {
  let canvas = document.querySelector("canvas");
  if (!canvas) return;

  canvas.style.width = "100%";
  canvas.style.height = "100%";
}

setInterval(fixCanvas, 500);
</script>

</body>
</html>
