<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
}

/* center game */
#wrapper {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(1);
  transform-origin:center;
}

/* small white handle */
#handle {
  position:absolute;
  right:-12px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:40px;
  background:white;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:ew-resize;
  user-select:none;
  font-size:10px;
  line-height:10px;
}

#handle span {
  color:black;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<div id="wrapper">
  <div id="gameContainer"></div>

  <div id="handle">
    <span>/\<br>\/</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/UnityLoader.js"></script>

<script>
var gameInstance = UnityLoader.instantiate(
  "gameContainer",
  "https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/adofaiii4.json"
);

const wrapper = document.getElementById("wrapper");
const handle = document.getElementById("handle");

let scale = 1;
let dragging = false;

handle.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const centerX = window.innerWidth / 2;
  const dist = Math.abs(e.clientX - centerX);

  // unlimited scaling
  scale = dist / 300;

  // minimum size so it doesn't disappear
  scale = Math.max(0.2, scale);

  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
});
</script>

</body>
</html>
