<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Binding of Isaac</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        #game {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script src="https://cdn.jsdelivr.net/npm/ruffle-rs@latest/dist/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            publicPath: "https://cdn.jsdelivr.net/npm/ruffle-rs@latest/dist/"
        };
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer(document.getElementById("game"));
        player.load("https://cdn.jsdelivr.net/gh/RobiFet/CMinterview@a4017231eca9f2173ad7ec0e63b01e4786b4ad6b/web/src/BiWrath.swf");
    </script>
</body>
</html>
