<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
}

/* center game wrapper */
#wrapper {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(1);
  transform-origin:center;
  width:480px;   /* default width */
  height:270px;  /* default height */
  background:#121212;
}

/* container for the game */
#gameContainer {
  width:100%;
  height:100%;
}

/* small white handle */
#handle {
  position:absolute;
  right:-12px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:40px;
  background:white;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:ew-resize;
  user-select:none;
  font-size:10px;
  line-height:10px;
}

#handle span {
  color:black;
  font-weight:bold;
  text-align:center;
}
</style>

<!-- ORIGINAL HEAD CODE -->
<script>
window.gameconfig = {
    name: "Tony Hawk's Pro Skater (USA)",
    url: "https://cdn.jsdelivr.net/gh/bubbls/ugss@2fc3907ff86a6758296508c4ecafe087a2ccd96e/tony%20hawk%20pro%20skater/Tony%20Hawk's%20Pro%20Skater%20(USA).chd",
    core: "psx",
    min: 1,
    max: 18,
};
</script>
<script>
function mergeFiles(fileParts, cb) {
  return new Promise((resolve, reject) => {
    let buffers = [];
    function fetchPart(index) {
      if (index >= fileParts.length) {
        let mergedBlob = new Blob(buffers);
        let mergedFileUrl = URL.createObjectURL(mergedBlob);
        resolve(mergedFileUrl);
        return;
      }
      fetch(fileParts[index])
        .then((response) => response.arrayBuffer())
        .then((data) => {
          buffers.push(data);
          fetchPart(index + 1);
        })
        .catch(reject);
      cb && cb(index);
    }
    fetchPart(0);
  });
}
function getParts(file, start, end) {
  let parts = [];
  for (let i = start; i <= end; i++) {
    let padded = String(i).padStart((end+"").length, '0');
    parts.push(file + ".part" + padded);
  }
  return parts;
}
getParts("asd.js", 0, 100)
</script>
</head>

<body>

<div id="wrapper">
  <div id="gameContainer">
    <div id="game"></div>
    <div id="loading-progress">Loading: 0/0</div>
    <div id="first-time">First-time loading may take longer...</div>
  </div>

  <div id="handle">
    <span>/\<br>\/</span>
  </div>
</div>

<script>
var parts = getParts(
    window.gameconfig.url,
    window.gameconfig.min,
    window.gameconfig.max
);
var totalParts = parts.length;

function updateLoadingProgress(loaded) {
    const progressElement = document.getElementById("loading-progress");
    if (loaded === 0) {
        progressElement.textContent = "Loading: 0/0";
    } else {
        progressElement.textContent = `Loading: ${loaded}/${totalParts}`;
    }
}

Promise.all([mergeFiles(parts, updateLoadingProgress)])
.then(([gameUrl]) => {
    document.getElementById("loading-progress").remove();
    document.getElementById("first-time").remove();
    EJS_player = "#game";
    EJS_core = window.gameconfig.core;
    EJS_gameName = window.gameconfig.name;
    EJS_color = "#0064ff";
    EJS_startOnLoaded = true;
    EJS_pathtodata = "https://cdn.jsdelivr.net/gh/genizy/emu@master/";
    EJS_gameUrl = gameUrl;
    EJS_biosUrl = "https://cdn.jsdelivr.net/gh/Abdess/retroarch_system@5f96368f6dbad5851cdb16a5041fefec4bdcd305/Sony%20-%20PlayStation/scph5501.bin";
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";
    document.body.appendChild(script);
})
.catch((error) => {
    console.error(error);
    document.getElementById("loading-progress").textContent = "Error loading game.";
});
</script>

<script>
// slider logic
const wrapper = document.getElementById("wrapper");
const handle = document.getElementById("handle");

let scale = 1;
let dragging = false;

handle.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const centerX = window.innerWidth / 2;
  const dist = Math.abs(e.clientX - centerX);

  // unlimited scaling
  scale = dist / 300;

  // minimum size so it doesn't disappear
  scale = Math.max(0.2, scale);

  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
});
</script>

</body>
</html>
